name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

  build:
    name: Build ${{ matrix.goos }} ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        goos:
          - linux
          - darwin
        goarch:
          - amd64
          - arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p bin
          go build \
            -trimpath \
            -ldflags "-s -w -X main.versionValue=${GITHUB_SHA} -X main.commitValue=${GITHUB_SHA::12} -X main.dateValue=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "bin/bare-systems_${GOOS}_${GOARCH}" \
            ./cmd/bare-systems

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: bare-systems-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/bare-systems_${{ matrix.goos }}_${{ matrix.goarch }}
          if-no-files-found: error
